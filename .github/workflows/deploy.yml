name: Build and Deploy

on:
  push:
    branches:
      - source

# Allow this workflow to write back to the repo (push to master)
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          # Sanity public project config (not secret — safe to expose)
          NEXT_PUBLIC_SANITY_PROJECT_ID: kay53yh8
          NEXT_PUBLIC_SANITY_DATASET: production

      - name: Deploy to master
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: master
          # Keep git history lean on the deploy branch
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
